<!DOCTYPE html>  
<html lang="pt-BR">  
<head>  
  <meta charset="UTF-8">

  <title>MISSEEN Collection</title>  

  <!-- === SEO Básico === -->

  <meta name="keywords" content="roupas alternativas, moda y2k, camisas exclusivas, streetwear brasil, roupas diferentes, marca alternativa, Dourados MS roupas, MISSEEN, camisetas estilosas">
  <meta name="author" content="MISSEEN">

  <!-- === Open Graph / Redes Sociais === -->
  <meta property="og:title" content="MISSEEN Alternative">
  <meta property="og:description" content="Marca exclusiva de roupas alternativas e Y2K de Dourados MS.">
  <meta property="og:type" content="website">

  <style>  
    * {  
      margin: 0;  
      padding: 0;  
      box-sizing: border-box;  
      font-family: 'Arial', sans-serif;  
    }  
    body {  
      background-color: #000000;  
      color: #f5f5f5;  
      line-height: 1.6;  
    }  
    a {  
      text-decoration: none;  
      color: inherit;  
    }  
      
    header {  
      padding: 20px;  
      text-align: center;  
      background: linear-gradient(90deg, #000000, #131313, #000000);  
      border-bottom: 2px solid #000000;  
    }  
    header h1 {  
      font-family: 'Genos', sans-serif;  
      font-size: 3rem;  
      letter-spacing: 3px;  
      color: #fff;  
    }  
    header p {  
      font-size: 1rem;  
      color: #aaa;  
      margin-top: 5px;  
    }  
  
    .shirts {  
      display: grid;  
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));  
      gap: 30px;  
      padding: 40px;  
      max-width: 1200px;  
      margin: auto;  
    }  
    .shirt {  
      background-color: #1c1c1c;  
      border: 1px solid #333;  
      padding: 20px;  
      text-align: center;  
      border-radius: 10px;  
      transition: transform 0.3s ease, box-shadow 0.3s ease;  
    }  
    .shirt:hover {  
      transform: translateY(-5px);  
      box-shadow: 0 5px 20px rgba(255,255,255,0.1);  
    }  
    .shirt img {  
      max-width: 100%;  
      border-radius: 5px;  
      margin-bottom: 15px;  
    }  
    .shirt h2 {  
      font-size: 1.5rem;  
      margin-bottom: 10px;  
      color: #fff;  
    }  

    /* NOVO: selects e preço */
    .shirt select {
      margin-bottom: 10px;
      padding: 8px;
      width: 100%;
      border-radius: 5px;
      border: none;
      background-color: #2a2a2a;
      color: #fff;
    }

    .price {
      margin: 10px 0;
      font-weight: bold;
      color: #ffffff;
    }

    .shirt button {  
      background-color: #490000;  
      color: #fff;  
      border: none;  
      padding: 10px 20px;  
      font-size: 1rem;  
      border-radius: 5px;  
      cursor: pointer;  
      transition: background-color 0.3s ease;  
    }  
    .shirt button:hover {  
      background-color: #520101;  
    }  
  
    footer {  
      text-align: center;  
      padding: 20px;  
      border-top: 2px solid #000000;  
      color: #727272;  
      font-size: 0.9rem;  
    }  
  
    @media (max-width: 500px) {  
      header h1 {  
        font-size: 2rem;  
      }  
    }  
  </style> 
  <link rel="shortcut icon" type="image/x-icon" href="Frame 11 (3).png"> 
</head>  
<body>  
  
  <header>  
    <h1>MISSEEN Alternative</h1>  
    <p>Encomende suas camisas exclusivas</p>  
  </header>  
  
  <section class="shirts">  

    <div class="shirt">  
      <img src="bola preto.jpeg">  
      <h2>Rupture Sphere</h2>  

      <select class="cor">
        <option value="">Escolha a cor</option>
        <option>Preto</option>
        <option>Branco</option>
      </select>

      <select class="tamanho">
        <option value="">Escolha o tamanho</option>
        <option>P</option>
        <option>M</option>
        <option>G</option>
        <option>GG</option>
      </select>

      <div class="price">R$ 99,90</div>

      <button onclick="encomendar(this, 'Rupture Sphere', '99,90')">Encomendar</button>  
    </div>  

    <div class="shirt">  
      <img src="alien preto.jpeg">  
      <h2>Unknown Invasion</h2>  

      <select class="cor">
        <option value="">Escolha a cor</option>
        <option>Preto</option>
        <option>Branco</option>
      </select>

      <select class="tamanho">
        <option value="">Escolha o tamanho</option>
        <option>P</option>
        <option>M</option>
        <option>G</option>
        <option>GG</option>
      </select>

      <div class="price">R$ 99,90</div>

      <button onclick="encomendar(this, 'Unknown Invasion', '99,90')">Encomendar</button>  
    </div>  

    <div class="shirt">  
      <img src="mulher preto.jpeg">  
      <h2>Fractured Identity</h2>  

      <select class="cor">
        <option value="">Escolha a cor</option>
        <option>Preto</option>
        <option>Branco</option>
      </select>

      <select class="tamanho">
        <option value="">Escolha o tamanho</option>
        <option>P</option>
        <option>M</option>
        <option>G</option>
        <option>GG</option>
      </select>

      <div class="price">R$ 99,90</div>

      <button onclick="encomendar(this, 'Fractured Identity', '99,90')">Encomendar</button>  
    </div>  

  </section>  
  
  <footer>  
    &copy; 2026 MISSEEN. Todos os direitos reservados. Dourados Ms - Brasil.  
  </footer>  
  
  <script>  
    const imagensCamisas = {
      "Rupture Sphere": {
        "Preto": "bola preto.jpeg",
        "Branco": "bola branco.jpeg"
      },
      "Unknown Invasion": {
        "Preto": "alien preto.jpeg",
        "Branco": "alien branco.jpeg"
      },
      "Fractured Identity": {
        "Preto": "mulher preto.jpeg",
        "Branco": "mulher branco.jpeg"
      }
    };

    // Troca de imagem ao selecionar cor
    document.querySelectorAll(".shirt").forEach(card => {
      const selectCor = card.querySelector(".cor");
      const img = card.querySelector("img");
      const nomeCamisa = card.querySelector("h2").innerText;

      selectCor.addEventListener("change", () => {
        const corSelecionada = selectCor.value;
        if (corSelecionada && imagensCamisas[nomeCamisa] && imagensCamisas[nomeCamisa][corSelecionada]) {
          img.src = imagensCamisas[nomeCamisa][corSelecionada];
        }
      });
    });

    // Função encomendar
    function encomendar(botao, nomeCamisa, preco) {  
      const numeroWhats = "556791823663";

      const card = botao.parentElement;
      const cor = card.querySelector(".cor").value;
      const tamanho = card.querySelector(".tamanho").value;

      if (!cor || !tamanho) {
        alert("Por favor, selecione cor e tamanho.");
        return;
      }

      const mensagem = `Olá! Gostaria de encomendar a camisa ${nomeCamisa} na cor ${cor}, tamanho ${tamanho}. Valor: R$ ${preco}.`;
      const url = `https://wa.me/${numeroWhats}?text=${encodeURIComponent(mensagem)}`;

      window.open(url, '_blank');
    }  
  </script>  
  
</body>  
</html>
